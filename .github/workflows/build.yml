name: Build JarvisAutomation APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK platforms
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Auto-Locate and Build APK
        run: |
          # यह कमांड आपके उलझे हुए फोल्डर्स के अंदर जाकर सही जगह ढूंढेगी
          TARGET_DIR=$(find . -name "settings.gradle" -exec dirname {} \;)
          echo "Found project directory at: $TARGET_DIR"
          cd "$TARGET_DIR"
          gradle assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JarvisAutomation-debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
